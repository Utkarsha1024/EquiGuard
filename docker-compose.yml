# ── EquiGuard docker-compose ───────────────────────────────────────────────────
# Spins up the full stack with one command:
#   docker-compose up --build
#
# Services:
#   backend  → FastAPI on http://localhost:8000
#   frontend → Streamlit on http://localhost:8501
#
# Requirements:
#   Copy .env.example → .env and fill in EQUIGUARD_API_KEY before running.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: equiguard_backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATA_DIR: /app/data
      DATABASE_PATH: /app/db_data/equiguard.db
    volumes:
      # Persist the SQLite database in a dedicated volume (avoids shadowing /app/data)
      - db_data:/app/db_data
      # Mount source for live reload in development
      - .:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # ── Streamlit Frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: equiguard_frontend
    command: streamlit run frontend/app.py --server.port=8501 --server.address=0.0.0.0 --server.headless=true
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      # Tell the frontend where to reach the backend inside Docker network
      API_BASE_URL: http://backend:8000
    volumes:
      - .:/app
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  db_data:
    driver: local
